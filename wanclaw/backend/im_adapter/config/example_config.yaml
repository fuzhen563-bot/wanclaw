# WanClaw IM适配器配置示例
# 复制此文件为 config.yaml 并修改配置

# 企业微信配置
wecom:
  enabled: true
  corp_id: "your_corp_id"                # 企业ID
  agent_id: "your_agent_id"              # 应用AgentId
  secret: "your_secret"                  # 应用Secret
  webhook_url: "https://your-domain.com/wecom/webhook"  # 回调URL（需要公网可访问）
  
# 飞书配置
feishu:
  enabled: true
  app_id: "your_app_id"                  # 应用App ID
  app_secret: "your_app_secret"          # 应用App Secret
  verification_token: "your_token"       # 事件验证Token
  encrypt_key: "your_key"                # 事件加密Key（可选）
  webhook_url: "https://your-domain.com/feishu/webhook"  # 事件订阅URL
  
# QQ配置
qq:
  enabled: true
  bot_id: "your_bot_id"                  # 机器人ID
  bot_secret: "your_bot_secret"          # 机器人Secret（如果有）
  qq_number: "123456789"                 # 机器人QQ号
  protocol: "onebot"                     # 协议类型：onebot, mirai
  ws_url: "ws://localhost:6700"          # WebSocket服务器地址
  http_url: "http://localhost:5700"      # HTTP服务器地址
  access_token: "your_access_token"      # 访问令牌（如果有）
  
# 微信配置
wechat:
  enabled: false                         # 微信配置较复杂，建议使用企业微信
  type: "work"                           # 类型：work(企业微信), official(公众号), thirdparty(第三方)
  app_id: "your_app_id"                  # 应用ID
  app_secret: "your_app_secret"          # 应用Secret
  corp_id: "your_corp_id"                # 企业ID（企业微信需要）
  agent_id: "your_agent_id"              # 应用AgentId（企业微信需要）
  thirdparty_url: "http://localhost:8080"  # 第三方机器人地址
  thirdparty_token: "your_token"         # 第三方机器人Token
  webhook_url: "https://your-domain.com/wechat/webhook"  # 回调URL
  
# Telegram配置
telegram:
  enabled: true
  bot_token: "your_bot_token"            # Bot Token
  proxy_url: null                        # 代理URL（国内需要）
  
# 网关配置
gateway:
  message_queue_size: 1000               # 消息队列大小
  max_retry_count: 3                     # 最大重试次数
  retry_delay: 1                         # 重试延迟（秒）
  
# 安全配置
security:
  rate_limit: 10                         # 消息频率限制（条/秒）
  enable_signature_check: true           # 启用签名检查
  allowed_ips:                           # IP白名单
    - "127.0.0.1"
    - "::1"
  
# 日志配置
logging:
  level: "INFO"                          # 日志级别：DEBUG, INFO, WARNING, ERROR
  file_path: "./logs/im_adapter.log"     # 日志文件路径
  max_size: 10485760                     # 最大文件大小（10MB）
  backup_count: 5                        # 备份文件数量
  
# 监控配置
monitoring:
  enable_metrics: true                   # 启用监控指标
  metrics_port: 9090                     # 监控端口
  health_check_interval: 30              # 健康检查间隔（秒）
  
# 高级配置
advanced:
  enable_compression: true               # 启用消息压缩
  connection_timeout: 30                 # 连接超时（秒）
  read_timeout: 30                       # 读取超时（秒）
  write_timeout: 30                      # 写入超时（秒")